# cargo-deny configuration for sepa
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets      = []
all-features = false

[advisories]
version = 2
ignore  = []

[licenses]
version = 2
allow   = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards         = "allow"
highlight         = "all"
deny              = []

[sources]
unknown-registry = "warn"
unknown-git      = "warn"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
